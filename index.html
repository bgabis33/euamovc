
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cartinha 💗</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* FUNDO ANIMADO */
body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ffe6f0, #ffd6eb, #fff, #ffe6f0);
    background-size: 400% 400%;
    animation: fundo 10s ease infinite;
}

@keyframes fundo {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* BOTÃO */
.botao {
    position: absolute;
    padding: 12px 20px;
    border: none;
    background: #e75480;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* CARTA */
.carta {
    width: 90%;
    max-width: 360px;
    background: #ffffff;
    padding: 30px 22px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(255,182,193,0.3);
    text-align: center;
    transform: translateY(50px);
    opacity: 0;
    transition: 0.8s;
}

.carta.ativa {
    transform: translateY(0);
    opacity: 1;
}

/* EFEITO FLUTUAR */
.carta:hover {
    transform: translateY(-5px);
}

/* TÍTULO COM BRILHO */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #e75480;
    margin-bottom: 15px;
    text-shadow: 0 0 10px rgba(231,84,128,0.4);
}

/* TEXTO */
#texto {
    font-size: 14px;
    line-height: 1.7;
    color: #555;
    white-space: pre-line;
}

/* FINAL */
.final {
    margin-top: 15px;
    color: #e75480;
    font-size: 16px;
}

/* CORAÇÕES */
.coracao {
    position: absolute;
    color: #ff4d88;
    animation: subir 5s linear infinite;
}

@keyframes subir {
    0% {
        transform: translateY(100vh);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<button class="botao" onclick="abrirCarta()">Abrir 💌</button>

<div class="carta" id="carta">
    <h1>Para meu amor 💗</h1>
    <p id="texto"></p>
    <div class="final">com carinho sua mulher💕</div>
</div>

<script>
const mensagem = `Peaga,

Não sou muito boa em escrever mas eu te amo 💗
Você é meu par perfeito, me acalma, me cuida e me faz sentir segura.

Desculpa por ser chata às vezes... é só porque eu te amo MUITO e tenho medo de te perder.

Eu amo você pra sempre. 💕`;

/* abrir carta */
function abrirCarta() {
    document.querySelector(".carta").classList.add("ativa");
    document.querySelector(".botao").style.display = "none";
    escrever();
}

/* efeito digitando */
let i = 0;
function escrever() {
    if (i < mensagem.length) {
        document.getElementById("texto").innerHTML += mensagem.charAt(i);
        i++;
        setTimeout(escrever, 25);
    }
}

/* criar corações */
setInterval(() => {
    const coracao = document.createElement("div");
    coracao.classList.add("coracao");
    coracao.innerHTML = "💗";
    coracao.style.left = Math.random() * 100 + "vw";
    coracao.style.fontSize = Math.random() * 20 + 10 + "px";

    document.body.appendChild(coracao);

    setTimeout(() => {
        coracao.remove();
    }, 5000);
}, 300);
</script>

</body>
</html>
